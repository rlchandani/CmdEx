name: CmdEx
options:
  bundleIdPrefix: com.cmdex
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

packages:
  CmdExCore:
    path: CmdExCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.6.0"

targets:
  CmdEx:
    type: application
    platform: macOS
    sources:
      - path: CmdEx
        excludes:
          - "App/main.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cmdex.app
        PRODUCT_NAME: CmdEx
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: CmdEx/Info.plist
        CODE_SIGN_ENTITLEMENTS: CmdEx/CmdEx.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: CmdExCore
        product: CmdExCore
      - package: Sparkle
        product: Sparkle
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  CmdExTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CmdExCore/Tests/CmdExCoreTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: CmdEx
      - package: CmdExCore
        product: CmdExCore

schemes:
  CmdEx:
    build:
      targets:
        CmdEx: all
        CmdExTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CmdExTests
    profile:
      config: Release
    archive:
      config: Release
