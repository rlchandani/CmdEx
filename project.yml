name: ShortcutBar
options:
  bundleIdPrefix: com.cmdex
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

packages:
  ShortcutBarCore:
    path: ShortcutBarCore

targets:
  ShortcutBar:
    type: application
    platform: macOS
    sources:
      - path: ShortcutBar
        excludes:
          - "App/main.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cmdex.app
        PRODUCT_NAME: ShortcutBar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ShortcutBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShortcutBar/ShortcutBar.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ShortcutBarCore
        product: ShortcutBarCore
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  ShortcutBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ShortcutBarCore/Tests/ShortcutBarCoreTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: ShortcutBar
      - package: ShortcutBarCore
        product: ShortcutBarCore

schemes:
  ShortcutBar:
    build:
      targets:
        ShortcutBar: all
        ShortcutBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShortcutBarTests
    profile:
      config: Release
    archive:
      config: Release
